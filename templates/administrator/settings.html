{% extends 'base_dashboard.html' %}

{% block title %}Pengaturan Akun dan Hotel{% endblock %}

{% block content %}
<div class="page-title">
    <div>
        <h1>Pengaturan Akun & Hotel</h1>
        <p class="muted">Atur identitas hotel, kontak, dan informasi pembayaran.</p>
    </div>
</div>

<form class="form-card" method="post">
    {% csrf_token %}

    {% for field in form %}
    <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {{ field.errors }}
    </div>
    {% endfor %}

    <button class="btn" type="submit">Simpan Pengaturan</button>
</form>
{% endblock %}
